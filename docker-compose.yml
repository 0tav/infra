version: '3.8'
services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: Dev
      POSTGRES_PASSWORD: Dev123
      POSTGRES_DB: dbBelajar
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql  # <--- to save database on my pc, so even if docker down by mistake it still safe

  cache:
    image: redis:latest
    ports:
      - "6379:6379"

  broker:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
